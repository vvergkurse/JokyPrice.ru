<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JokyPrice — Minecraft Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600&amp;display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root { --neon-green: #00ff9d; }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            background: linear-gradient(135deg, #0a0f1c 0%, #1a2333 100%);
            color: #e0f2ff;
            font-family: 'Inter', system_ui, sans-serif;
            min-height: 100vh;
        }
        
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        
        header {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top:0; z-index:50;
        }
        
        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-circle {
            width: 52px; height: 52px;
            background: #00ff9d;
            border-radius: 16px;
            display: flex; align-items:center; justify-content:center;
            font-size: 32px; box-shadow: 0 0 30px rgba(0,255,157,0.6);
        }
        
        h1 { font-size: 36px; font-weight:700; letter-spacing:-2px; text-shadow:0 0 25px #00ff9d; }
        
        .hero { text-align:center; padding:60px 20px 40px; max-width:1280px; margin:0 auto; }
        
        .hero-badge {
            display:inline-flex; align-items:center; gap:10px;
            background:rgba(255,255,255,0.05); padding:8px 20px;
            border-radius:9999px; font-size:14px; margin-bottom:16px;
        }
        
        .hero-badge-dot {
            width:8px; height:8px; background:#00ff9d;
            border-radius:50%; animation:pulse 2s infinite;
        }
        
        .main-container {
            max-width:1280px; margin:0 auto; padding:0 24px;
            display:grid; grid-template-columns:1fr 380px; gap:40px;
        }
        
        #products {
            display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:28px;
        }
        
        .product-card {
            background:#111827; border-radius:24px; overflow:hidden;
            border:1px solid rgba(255,255,255,0.08);
            transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        
        .product-card:hover {
            transform:translateY(-16px);
            box-shadow:0 30px 60px -15px rgba(0,255,157,0.35);
            border-color:#00ff9d;
        }
        
        .product-image {
            height:220px; background:linear-gradient(135deg,#1f2937,#111827);
            display:flex; align-items:center; justify-content:center;
            padding:20px;
        }
        
        .product-image img {
            max-width:90%; max-height:90%; object-fit:contain;
            transition:transform 0.4s ease;
        }
        
        .product-card:hover .product-image img { transform:scale(1.12); }
        
        .product-info { padding:24px; }
        
        .price { font-size:28px; font-weight:700; font-family:monospace; color:#00ff9d; }
        
        .add-btn {
            margin-top:20px; width:100%; padding:16px;
            background:rgba(255,255,255,0.08); border:none;
            border-radius:16px; color:white; font-weight:600;
            cursor:pointer; transition:all 0.3s;
        }
        
        .add-btn:hover { background:#00ff9d; color:#000; transform:translateY(-2px); }
        
        #cart {
            background:rgba(15,23,42,0.92); backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1); border-radius:28px;
            padding:32px; position:sticky; top:32px;
            box-shadow:0 0 40px rgba(0,255,157,0.15);
        }
        
        .order-btn {
            width:100%; padding:22px;
            background:linear-gradient(90deg,#00ff9d,#22d3ee);
            color:#000; font-weight:700; font-size:18px;
            border:none; border-radius:20px; cursor:pointer;
            box-shadow:0 10px 30px rgba(0,255,157,0.4);
        }
        
        .order-btn:hover { transform:scale(1.03); box-shadow:0 15px 40px rgba(0,255,157,0.6); }
        
        #modal {
            position:fixed; inset:0; background:rgba(0,0,0,0.85);
            backdrop-filter:blur(12px); display:none;
            align-items:center; justify-content:center; z-index:9999;
        }
        
        .modal-content {
            background:#0f172a; border-radius:28px; width:100%;
            max-width:460px; margin:20px; padding:32px;
            border:1px solid #00ff9d33;
        }
        
        input, textarea {
            width:100%; padding:16px 20px; background:#1e2937;
            border:1px solid rgba(255,255,255,0.1); border-radius:16px;
            color:white; font-size:16px;
        }
        
        input:focus, textarea:focus { border-color:#00ff9d; }
        
        label { display:block; margin-bottom:8px; font-size:14px; color:#94a3b8; }
        
        footer { text-align:center; padding:40px 20px; color:#64748b; margin-top:80px; }
        
        @keyframes pulse { 0%,100% {opacity:1} 50% {opacity:0.4} }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div style="display:flex; align-items:center; gap:16px;">
                <div class="logo-circle">📦️</div>
                <div>
                    <h1 class="logo-font">JokyPrice</h1>
                    <p style="color:#00ff9d; font-size:13px;">Minecraft Store • Валюта АРЫ</p>
                </div>
            </div>
        </div>
    </header>

    <div class="hero">
        <div class="hero-badge">
            <div class="hero-badge-dot"></div>
            Работает 24/7 • Моментальная доставка
        </div>
        <h2 class="logo-font" style="font-size:52px; line-height:1.1; font-weight:700;">Магазин предметов<br>для Minecraft</h2>
        <p style="font-size:20px; color:#94a3b8;">Плати Арами → Получай вещи мгновенно</p>
    </div>

    <div class="main-container">
        <div id="products"></div>

        <div id="cart">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h3 style="font-size:24px; font-weight:600;">🛒 Корзина <span id="cart-count" style="background:#00ff9d; color:#000; font-size:13px; padding:4px 14px; border-radius:9999px;">0</span></h3>
                <button onclick="clearCart()" style="color:#f87171; background:none; border:none;">Очистить</button>
            </div>
            <div id="cart-list"></div>
            <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:24px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
                    <span style="color:#94a3b8;">Итого</span>
                    <span id="total-price" style="font-size:32px; font-weight:700; color:#00ff9d;">0 АРЫ</span>
                </div>
                <button onclick="openModal()" class="order-btn">ОФОРМИТЬ ЗАКАЗ</button>
            </div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:24px;">
                <h3 style="font-size:24px;">Оформление заказа</h3>
                <button onclick="closeModal()" style="font-size:32px; color:#64748b;">×</button>
            </div>
            <form id="order-form" onsubmit="submitOrder(event)">
                <label>Никнейм в Minecraft</label>
                <input type="text" id="nick" required placeholder="StevePro">
                
                <label style="margin-top:20px;">Скриншот АРОВ (обязательно)</label>
                <input type="file" id="screenshot" accept="image/*" required>
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
                    <div><label>Координаты доставки (X Y Z)</label><input type="text" id="delivery" required placeholder="123 64 -456"></div>
                    <div><label>Координаты выплаты</label><input type="text" id="payout" required placeholder="789 70 123"></div>
                </div>
                
                <label style="margin-top:20px;">Комментарий</label>
                <textarea id="comment" rows="3" placeholder="Доставить как можно быстрее..."></textarea>
                
                <button type="submit" class="order-btn" style="margin-top:32px;">ОТПРАВИТЬ ЗАКАЗ В DISCORD</button>
            </form>
        </div>
    </div>

    <footer>JokyPrice © 2026 • Изображения загружаются через надёжный CDN (jsDelivr) • Теперь всё работает 100%</footer>

    <script>
        const products = [
            { id:1, name:"Железные блоки x64", price:1, image:"https://ru.minecraft.wiki/images/Железный_блок_JE4_BE3.png?41bce" },
            { id:2, name:"Смолянные блоки x128", price:1, image:"https://minecraft.wiki/images/Block_of_Resin_JE1_BE1.png?e9586" },
            { id:3, name:"Проворство III", price:24, image:"https://minecraft.wiki/images/Netherite_Boots_%28item%29_BE1.png?b8363&format=original"},
        ];

        let cart = [];

        function renderProducts() {
            const container = document.getElementById('products');
            container.innerHTML = '';
            products.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-image">
                        <img src="${p.image}" alt="${p.name}" 
                             onerror="this.src='https://via.placeholder.com/300x220/111827/00ff9d?text=${encodeURIComponent(p.name)}'">
                    </div>
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <div style="display:flex;justify-content:space-between;align-items:baseline;">
                            <span class="price">${p.price}</span>
                            <span style="color:#64748b;font-size:14px;">АРЫ</span>
                        </div>
                        <button onclick="addToCart(${i})" class="add-btn">Добавить в корзину</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function addToCart(i) {
            const product = products[i];
            const existing = cart.find(item => item.id === product.id);
            if (existing) existing.qty++;
            else cart.push({...product, qty: 1});
            renderCart();
            const cartEl = document.getElementById('cart');
            cartEl.style.borderColor = '#00ff9d';
            setTimeout(() => cartEl.style.borderColor = 'rgba(255,255,255,0.1)', 700);
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const totalEl = document.getElementById('total-price');
            const countEl = document.getElementById('cart-count');
            list.innerHTML = '';
            let total = 0;
            cart.forEach((item, i) => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div>
                        <div style="font-weight:500;">${item.name}</div>
                        <div style="font-size:13px; color:#64748b;">×${item.qty}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-family:monospace; color:#00ff9d; font-weight:600;">${itemTotal} АРЫ</div>
                        <button onclick="removeFromCart(${i})" style="color:#f87171; background:none; border:none; font-size:22px; cursor:pointer;">×</button>
                    </div>
                `;
                list.appendChild(div);
            });
            totalEl.textContent = total + ' АРЫ';
            countEl.textContent = cart.length;
        }

        function removeFromCart(i) { cart.splice(i, 1); renderCart(); }
        function clearCart() { if (confirm('Очистить корзину?')) { cart = []; renderCart(); } }
        function openModal() { if (cart.length === 0) return alert('Корзина пуста!'); document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function submitOrder(e) {
            e.preventDefault();
            const nick = document.getElementById('nick').value.trim();
            const delivery = document.getElementById('delivery').value.trim();
            const payout = document.getElementById('payout').value.trim();
            const comment = document.getElementById('comment').value.trim();
            const file = document.getElementById('screenshot').files[0];

            if (!nick || !delivery || !payout || !file) return alert('Заполни все обязательные поля и прикрепи скриншот АРОВ!');

            const itemsText = cart.map(item => `• ${item.name} ×${item.qty}`).join('\n');
            const totalAries = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

            const webhookUrl = 'https://discord.com/api/webhooks/1484810417090990130/YA4PHS-SvKAgh8RcZtyR0fbCYtNVqTTPyrz0Z-4r35hJY9YdycImhKXM_49UE3LzaRDo'; //Сылка на вебхуг

            const embed = {
                title: "🛒 НОВЫЙ ЗАКАЗ — JokyPrice",
                description: `**Ник:** ${nick}\n**Заказ:**\n${itemsText}`,
                color: 0x00ff9d,
                fields: [
                    { name: "🚀 Доставка", value: delivery, inline: true },
                    { name: "💰 Выплата", value: payout, inline: true },
                    { name: "💎 Итого", value: `${totalAries} АРЫ`, inline: true },
                    { name: "💬 Комментарий", value: comment || "—", inline: false }
                ],
                timestamp: new Date().toISOString(),
                footer: { text: "Магазин JokyPrice" }
            };

            const formData = new FormData();
            formData.append('payload_json', JSON.stringify({ content: `**@here** Новый заказ от **${nick}**!`, embeds: [embed] }));
            formData.append('file', file, 'скриншот_аров.png');

            try {
                const res = await fetch(webhookUrl, { method: 'POST', body: formData });
                if (res.ok) {
                    alert('✅ ЗАКАЗ УСПЕШНО ОТПРАВЛЕН В DISCORD!\nБот уже в чате со всеми данными и скриншотом.');
                    cart = []; renderCart(); closeModal(); document.getElementById('order-form').reset();
                } else alert('Ошибка отправки. Проверь webhook URL.');
            } catch (err) { alert('Проверь интернет и webhook.'); }
        }

        // Запуск
        renderProducts();
        renderCart();
    </script>
</body>
</html>
