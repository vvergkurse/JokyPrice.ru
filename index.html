<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JokyPrice — Minecraft Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="jokyprice.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div style="display:flex; align-items:center; gap:16px;">
                <div class="logo-circle">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Joker_card.svg/512px-Joker_card.svg.png" alt="Joky">
                </div>
                <div>
                    <h1 class="logo-font">JokyPrice</h1>
                    <p style="color:#00ff9d; font-size:13px;">Minecraft Store • Валюта АРЫ</p>
                </div>
            </div>
        </div>
    </header>

    <div class="hero">
        <div class="hero-badge">
            <div class="hero-badge-dot"></div>
            Работает 24/7 • Моментальная доставка
        </div>
        <h2 class="logo-font" style="font-size:52px; line-height:1.1; font-weight:700;">Магазин предметов<br>для Minecraft</h2>
        <p style="font-size:20px; color:#94a3b8;">Плати Арами → Получай вещи мгновенно</p>
    </div>

    <div class="main-container">
        <div id="products"></div>

        <div id="cart">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h3 style="font-size:24px; font-weight:600;">🛒 Корзина 
                    <span id="cart-count" style="background:#00ff9d; color:#000; font-size:13px; padding:4px 14px; border-radius:9999px;">0</span>
                </h3>
                <!-- Кнопка теперь с id и классом -->
                <button onclick="clearCart()" id="clear-btn" class="clear-btn" style="color:#f87171; background:none; border:none;">Очистить корзину</button>
            </div>
            
            <div id="cart-list"></div>
            
            <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:24px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
                    <span style="color:#94a3b8;">Итого</span>
                    <span id="total-price" style="font-size:32px; font-weight:700; color:#00ff9d;">0 АРЫ</span>
                </div>
                <button onclick="openModal()" class="order-btn">ОФОРМИТЬ ЗАКАЗ</button>
            </div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:24px;">
                <h3 style="font-size:24px;">Оформление заказа</h3>
                <button onclick="closeModal()" style="font-size:32px; color:#64748b;">×</button>
            </div>
            <form id="order-form" onsubmit="submitOrder(event)">
                <label>Никнейм в Minecraft</label>
                <input type="text" id="nick" required placeholder="StevePro">
                
                <label style="margin-top:20px;">Скриншот АРОВ (обязательно)</label>
                <input type="file" id="screenshot" accept="image/*" required>
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
                    <div><label>Координаты доставки (X Y Z)</label><input type="text" id="delivery" required placeholder="123 64 -456"></div>
                    <div><label>Координаты выплаты</label><input type="text" id="payout" required placeholder="789 70 123"></div>
                </div>
                
                <label style="margin-top:20px;">Комментарий (не обязательно)</label>
                <textarea id="comment" rows="3" placeholder="Доставить как можно быстрее..."></textarea>
                
                <button type="submit" class="order-btn" style="margin-top:32px;">ОТПРАВИТЬ ЗАКАЗ В DISCORD</button>
            </form>
        </div>
    </div>

    <footer>
        JokyPrice © 2026 • 
        <button onclick="adminPanel()" style="background:none;border:none;color:#00ff9d;cursor:pointer;">Админ-панель</button>
        • Защита от спама активна
    </footer>

    <script>
        const products = [
            { id:1, name:"Железные блоки x64", price:1, image:"https://ru.minecraft.wiki/images/Железный_блок_JE4_BE3.png?41bce" },
            { id:2, name:"Смолянные блоки x128", price:1, image:"https://minecraft.wiki/images/Block_of_Resin_JE1_BE1.png?e9586" },
            { id:3, name:"Проворство III", price:24, image:"https://minecraft.wiki/images/Netherite_Boots_%28item%29_BE1.png?b8363&format=original"}
        ];

        let cart = [];

        function renderProducts() {
            const container = document.getElementById('products');
            container.innerHTML = '';
            products.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-image">
                        <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300x220/111827/00ff9d?text=${encodeURIComponent(p.name)}'">
                    </div>
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <div style="display:flex;justify-content:space-between;align-items:baseline;">
                            <span class="price">${p.price}</span>
                            <span style="color:#64748b;font-size:14px;">АРЫ</span>
                        </div>
                        <button onclick="addToCart(${i})" class="add-btn">Добавить в корзину</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function addToCart(i) {
            const product = products[i];
            const existing = cart.find(item => item.id === product.id);
            if (existing) existing.qty++;
            else cart.push({...product, qty: 1});
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const totalEl = document.getElementById('total-price');
            const countEl = document.getElementById('cart-count');
            const clearBtn = document.getElementById('clear-btn');

            list.innerHTML = '';
            let total = 0;

            cart.forEach((item, i) => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div>
                        <div style="font-weight:500;">${item.name}</div>
                        <div style="font-size:13px; color:#64748b;">×${item.qty}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-family:monospace; color:#00ff9d; font-weight:600;">${itemTotal} АРЫ</div>
                        <button onclick="removeFromCart(${i})" style="color:#f87171; background:none; border:none; font-size:22px; cursor:pointer;">×</button>
                    </div>
                `;
                list.appendChild(div);
            });

            totalEl.textContent = total + ' АРЫ';
            countEl.textContent = cart.length;

            // === КНОПКА ОЧИСТИТЬ ПОЯВЛЯЕТСЯ ТОЛЬКО КОГДА ЕСТЬ ТОВАРЫ ===
            if (cart.length > 0) {
                clearBtn.classList.add('show');
            } else {
                clearBtn.classList.remove('show');
            }
        }

        function removeFromCart(i) { cart.splice(i, 1); renderCart(); }
        function clearCart() { 
            if (confirm('Очистить корзину?')) { 
                cart = []; 
                renderCart(); 
            } 
        }
        function openModal() { 
            if (cart.length === 0) return alert('Корзина пуста!'); 
            document.getElementById('modal').style.display = 'flex'; 
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // ВАЛИДАЦИЯ + КУЛДАУН + БАН + DISCORD (оставлено без изменений)
        async function submitOrder(e) {
            // ... (твой текущий код submitOrder полностью) ...
            // (я не менял эту часть, просто вставь свой старый код сюда)
        }

        function adminPanel() {
            const pass = prompt('Введите пароль:');
            if (pass === 'jokyadmin123') {
                if (confirm('Разбанить пользователя?')) {
                    localStorage.removeItem('banned');
                    localStorage.removeItem('orders');
                    localStorage.removeItem('lastOrder');
                    alert('Пользователь разбанен!');
                }
            } else alert('Неверный пароль!');
        }

        renderProducts();
        renderCart();
    </script>
</body>
</html>
