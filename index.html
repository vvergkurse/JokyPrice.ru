<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JokyPrice — Minecraft Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="jokyprice.css">
</head>
<body>
    <!-- УЛУЧШЕННАЯ ШАПКА -->
    <header>
        <div class="header-content">
            <div style="display:flex; align-items:center; gap:16px;">
                <div class="logo-circle">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Joker_card.svg/512px-Joker_card.svg.png" alt="Joky">
                </div>
                <div>
                    <h1 class="logo-font">JokyPrice</h1>
                    <p style="color:#00ff9d; font-size:13px;">Minecraft Store • Валюта АРЫ</p>
                </div>
            </div>
        </div>
    </header>

    <div class="hero">
        <div class="hero-badge">
            <div style="width:8px;height:8px;background:#00ff9d;border-radius:50%;animation:pulse 2s infinite;"></div>
            Работает 24/7 • Моментальная доставка
        </div>
        <h2 class="logo-font" style="font-size:52px; line-height:1.1; font-weight:700;">Магазин предметов<br>для Minecraft</h2>
        <p style="font-size:20px; color:#94a3b8;">Плати Арами → Получай вещи мгновенно</p>
    </div>

    <div class="main-container">
        <div id="products"></div>

        <div id="cart">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h3 style="font-size:24px; font-weight:600;">🛒 Корзина <span id="cart-count" style="background:#00ff9d;color:#000;font-size:13px;padding:4px 14px;border-radius:9999px;">0</span></h3>
                <button onclick="clearCart()" id="clear-btn" class="clear-btn" style="color:#f87171;background:none;border:none;font-size:15px;">Очистить корзину</button>
            </div>
            
            <div id="cart-list" style="min-height:100px;"></div>
            
            <!-- Плейсхолдер пустой корзины -->
            <div id="empty-cart" style="text-align:center; padding:40px 20px; color:#64748b; font-size:15px;">
                Корзина пуста<br>Добавьте товары из каталога ↓
            </div>

            <div style="border-top:1px solid rgba(255,255,255,0.1);padding-top:24px;">
                <div style="display:flex;justify-content:space-between;margin-bottom:16px;">
                    <span style="color:#94a3b8;">Итого</span>
                    <span id="total-price" style="font-size:32px;font-weight:700;color:#00ff9d;">0 АРЫ</span>
                </div>
                <button onclick="openModal()" class="order-btn">ОФОРМИТЬ ЗАКАЗ</button>
            </div>
        </div>
    </div>

    <!-- ТОАСТ УВЕДОМЛЕНИЕ -->
    <div id="add-toast">✅ Добавлено в корзину!</div>

    <!-- МОДАЛКА И ФУТЕР (без изменений) -->
    <div id="modal">... (твой старый код модалки) ...</div>

    <footer>
        JokyPrice © 2026 • 
        <button onclick="adminPanel()" style="background:none;border:none;color:#00ff9d;cursor:pointer;">Админ-панель</button>
    </footer>

    <script>
        // === ТОВАРЫ ===
        const products = [ /* твои товары */ ];

        let cart = [];

        function renderProducts() { /* твой код */ }

        function addToCart(i) {
            // ... твой код добавления ...

            // === АНИМАЦИЯ + УВЕДОМЛЕНИЕ ===
            document.getElementById('cart').classList.add('shake');
            setTimeout(() => document.getElementById('cart').classList.remove('shake'), 600);

            const toast = document.getElementById('add-toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2200);

            renderCart();
        }

        function renderCart() {
            // ... твой код ...

            const clearBtn = document.getElementById('clear-btn');
            const emptyCart = document.getElementById('empty-cart');

            if (cart.length > 0) {
                clearBtn.classList.add('show');
                emptyCart.style.display = 'none';
            } else {
                clearBtn.classList.remove('show');
                emptyCart.style.display = 'block';
            }
        }

        // Остальные функции (remove, clear, openModal, submitOrder, adminPanel) — оставь как были

        renderProducts();
        renderCart();
    </script>
</body>
</html>
